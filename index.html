<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LaTeX CV Generator</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#ffffff; --bg2:#f4f4f4; --bg3:#e8e8e8;
  --border:#cccccc; --border2:#aaaaaa;
  --text:#111111; --text2:#444444; --text3:#777777;
  --accent:#111111; --accent-fg:#ffffff;
  --input-bg:#ffffff;
  --shadow:0 2px 8px rgba(0,0,0,.10); --shadow-lg:0 6px 24px rgba(0,0,0,.14);
  --radius:4px; --mono:'JetBrains Mono',monospace; --sans:'DM Sans',sans-serif; --danger:#cc2222;
}
[data-theme="dark"] {
  --bg:#0f0f0f; --bg2:#1a1a1a; --bg3:#242424;
  --border:#333333; --border2:#555555;
  --text:#f0f0f0; --text2:#bbbbbb; --text3:#777777;
  --accent:#f0f0f0; --accent-fg:#0f0f0f;
  --input-bg:#1a1a1a;
  --shadow:0 2px 8px rgba(0,0,0,.40); --shadow-lg:0 6px 24px rgba(0,0,0,.60);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px;scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;transition:background .25s,color .25s;padding-bottom:3rem}
button{cursor:pointer;font-family:var(--sans)}
input,textarea{font-family:var(--sans)}

/* ── topbar ── */
#topbar{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.4rem;
  padding:.65rem 2rem;background:var(--bg);border-bottom:1.5px solid var(--border);box-shadow:var(--shadow);
}
#topbar h1{font-family:var(--mono);font-size:1rem;font-weight:700;letter-spacing:.04em;white-space:nowrap}
.topbar-right{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap}

/* palettes */
.palette-bar{display:flex;align-items:center;gap:.35rem}
.palette-label{font-size:.68rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin-right:.15rem}
.pal{
  width:1.3rem;height:1.3rem;border-radius:50%;border:2px solid transparent;
  cursor:pointer;transition:transform .15s,border-color .15s;flex-shrink:0;
}
.pal:hover{transform:scale(1.18)}
.pal.active{border-color:var(--text)}

/* ── buttons ── */
.btn{
  display:inline-flex;align-items:center;gap:.4rem;padding:.45rem 1rem;
  font-size:.82rem;font-weight:600;letter-spacing:.03em;
  border:1.5px solid var(--border2);border-radius:var(--radius);
  background:transparent;color:var(--text);
  transition:background .15s,color .15s,border-color .15s;white-space:nowrap;
}
.btn:hover{background:var(--bg3);border-color:var(--text)}
.btn.primary{background:var(--accent);color:var(--accent-fg);border-color:var(--accent)}
.btn.primary:hover{opacity:.85}
.btn.danger{color:var(--danger);border-color:var(--danger)}
.btn.danger:hover{background:var(--danger);color:#fff}
.btn.sm{padding:.28rem .65rem;font-size:.75rem}
#theme-toggle{
  width:2.1rem;height:2.1rem;display:flex;align-items:center;justify-content:center;
  border:1.5px solid var(--border2);border-radius:var(--radius);
  background:transparent;font-size:1rem;cursor:pointer;color:var(--text);transition:background .15s;
}
#theme-toggle:hover{background:var(--bg3)}

/* ── layout ── */
#app{max-width:860px;margin:0 auto;padding:2rem 1.5rem 6rem}
.personal-block{
  border:1.5px solid var(--border);border-radius:var(--radius);
  padding:1.25rem 1.5rem;margin-bottom:1.75rem;background:var(--bg2);
}
.personal-block h2{
  font-family:var(--mono);font-size:.78rem;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:1rem;
}
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem .9rem}
.field-group{display:flex;flex-direction:column;gap:.3rem}
.field-group label{font-size:.72rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3)}
.field-group input{
  background:var(--input-bg);border:1.5px solid var(--border);border-radius:var(--radius);
  color:var(--text);padding:.42rem .6rem;font-size:.9rem;outline:none;
  transition:border-color .15s;width:100%;
}
.field-group input:focus{border-color:var(--border2)}

/* ── sections ── */
#sections-list{display:flex;flex-direction:column;gap:1.25rem}
.section-card{border:1.5px solid var(--border);border-radius:var(--radius);background:var(--bg2);overflow:hidden;transition:box-shadow .15s,border-color .15s}
.section-card.drag-over,.pagebreak-card.drag-over{border-color:var(--border2);box-shadow:var(--shadow-lg);outline:2px dashed var(--border2)}
.section-header{display:flex;align-items:center;gap:.6rem;padding:.7rem 1rem;border-bottom:1.5px solid var(--border);background:var(--bg3);user-select:none}
.section-drag-handle{font-size:1.1rem;color:var(--text3);cursor:grab;padding:.1rem .3rem;border-radius:2px}
.section-drag-handle:active{cursor:grabbing}
.section-drag-handle:hover{color:var(--text2)}
.section-name{flex:1;font-family:var(--mono);font-size:.82rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text);background:transparent;border:none;outline:none}
.section-name:focus{background:var(--input-bg);border-bottom:1.5px solid var(--border2);padding:0 .3rem}
.section-actions{display:flex;gap:.4rem;margin-left:auto}
.section-body{padding:1rem 1rem .8rem}
.section-type-label{font-size:.68rem;font-weight:600;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin-left:.3rem}
.pagebreak-card{border:1.5px dashed var(--border2);border-radius:var(--radius);background:var(--bg2);overflow:hidden}
.pagebreak-header{display:flex;align-items:center;gap:.6rem;padding:.7rem 1rem;background:var(--bg3);user-select:none}
.pagebreak-label{flex:1;font-family:var(--mono);font-size:.82rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}

/* ── entries ── */
.entries-list{display:flex;flex-direction:column;gap:.75rem}
.entry-card{border:1.5px solid var(--border);border-radius:var(--radius);background:var(--bg);overflow:hidden}
.entry-card.drag-over{outline:2px dashed var(--border2)}
.entry-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .7rem;background:var(--bg2);border-bottom:1.5px solid var(--border);cursor:pointer;user-select:none}
.entry-drag-handle{font-size:.95rem;color:var(--text3);cursor:grab}
.entry-drag-handle:active{cursor:grabbing}
.entry-title-preview{flex:1;font-size:.82rem;font-weight:500;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.entry-toggle{font-size:.8rem;color:var(--text3);transition:transform .2s}
.entry-toggle.open{transform:rotate(180deg)}
.entry-body{padding:.75rem .8rem;display:none}
.entry-body.open{display:block}
.entry-fields{display:flex;flex-direction:column;gap:.55rem}
.entry-field{display:flex;flex-direction:column;gap:0}
.entry-field label{font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:.25rem}
.entry-field input{background:var(--input-bg);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);padding:.38rem .55rem;font-size:.88rem;outline:none;transition:border-color .15s;width:100%}
.entry-field input:focus{border-color:var(--border2)}
.entry-footer{display:flex;justify-content:flex-end;padding:.5rem .8rem;border-top:1.5px solid var(--border);background:var(--bg2)}

/* ── rich text toolbar ── */
.rich-toolbar{
  display:flex;align-items:center;gap:3px;flex-wrap:wrap;
  background:var(--bg3);border:1.5px solid var(--border);border-bottom:none;
  border-radius:var(--radius) var(--radius) 0 0;padding:3px 5px;
}
.rtb{
  padding:2px 8px;font-size:.78rem;font-weight:700;line-height:1.5;
  border:1px solid var(--border2);border-radius:2px;
  background:var(--bg2);color:var(--text);cursor:pointer;transition:background .1s;user-select:none;
}
.rtb:hover{background:var(--border)}
.color-swatch{
  width:1.1rem;height:1.1rem;border-radius:3px;
  border:1.5px solid rgba(128,128,128,.4);
  cursor:pointer;transition:transform .1s,border-color .1s;flex-shrink:0;
  display:inline-block;user-select:none;
}
.color-swatch:hover{transform:scale(1.2);border-color:var(--text)}
.toolbar-sep{width:1px;height:1.1rem;background:var(--border2);margin:0 2px;flex-shrink:0}

/* ── rich editor ── */
.rich-editor{
  background:var(--input-bg);border:1.5px solid var(--border);border-radius:0 0 var(--radius) var(--radius);
  color:var(--text);padding:.38rem .55rem;font-size:.88rem;outline:none;width:100%;cursor:text;
  transition:border-color .15s;line-height:1.55;word-break:break-word;
}
.rich-editor:focus{border-color:var(--border2)}
.rich-editor.short{min-height:30px;white-space:nowrap;overflow:hidden}
.rich-editor.long{min-height:70px}
.rich-editor b,.rich-editor strong{font-weight:700}
.rich-editor i,.rich-editor em{font-style:italic}
.rich-editor u{text-decoration:underline}
.rich-editor ul{list-style:disc;padding-left:1.3em;margin:.15em 0}
.rich-editor li{margin:.08em 0}

/* ── add rows ── */
.add-entry-row{margin-top:.65rem;display:flex;justify-content:center}
#add-section-bar{margin-top:1.25rem;display:flex;justify-content:center;gap:.7rem;flex-wrap:wrap}

/* ── action bar ── */
#action-bar{
  position:fixed;bottom:0;left:0;right:0;
  display:flex;justify-content:center;gap:.75rem;align-items:center;
  padding:.9rem 2rem;background:var(--bg);
  border-top:1.5px solid var(--border);box-shadow:0 -4px 16px rgba(0,0,0,.15);z-index:100;
}

/* ── credits ── */
#credits{
  text-align:center;padding:.6rem 1rem;font-size:.72rem;color:var(--text3);
  border-top:1px solid var(--border);margin-top:1rem;
}
#credits a{color:var(--text3);text-decoration:underline}
#credits a:hover{color:var(--text2)}

/* ── modals ── */
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;align-items:center;justify-content:center}
.modal-backdrop.open{display:flex}
.modal{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius);width:min(92vw,820px);max-height:90vh;display:flex;flex-direction:column;box-shadow:var(--shadow-lg)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.1rem;border-bottom:1.5px solid var(--border);background:var(--bg3)}
.modal-header h3{font-family:var(--mono);font-size:.85rem;font-weight:700;letter-spacing:.07em}
.modal-body{flex:1;overflow:auto;padding:1.1rem}
.modal-footer{display:flex;justify-content:flex-end;gap:.6rem;padding:.75rem 1.1rem;border-top:1.5px solid var(--border);background:var(--bg3)}

/* bug report form */
.form-field{display:flex;flex-direction:column;gap:.3rem;margin-bottom:.7rem}
.form-field label{font-size:.72rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3)}
.form-field input,.form-field textarea,.form-field select{
  background:var(--input-bg);border:1.5px solid var(--border);border-radius:var(--radius);
  color:var(--text);padding:.42rem .6rem;font-size:.88rem;outline:none;
  transition:border-color .15s;width:100%;font-family:var(--sans);
}
.form-field input:focus,.form-field textarea:focus,.form-field select:focus{border-color:var(--border2)}
.form-field textarea{min-height:80px;resize:vertical}
#bug-status{font-size:.82rem;text-align:center;padding:.3rem 0}

/* LaTeX / PDF */
#latex-code{font-family:var(--mono);font-size:.76rem;line-height:1.65;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius);padding:1rem;white-space:pre;overflow:auto;color:var(--text);max-height:60vh}
#pdf-frame{width:100%;height:55vh;border:1.5px solid var(--border);border-radius:var(--radius);background:#fff}
#pdf-status{font-size:.85rem;color:var(--text2);padding:.5rem 0;text-align:center}
#debug-log{font-family:var(--mono);font-size:.72rem;line-height:1.55;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius);padding:.6rem .8rem;white-space:pre-wrap;overflow:auto;color:var(--text3);max-height:130px;margin-top:.6rem;display:none}
#debug-log.visible{display:block}
#debug-toggle{font-size:.72rem;color:var(--text3);background:none;border:none;cursor:pointer;text-decoration:underline;padding:.3rem 0;display:none}
.spinner{display:inline-block;width:1em;height:1em;border:2px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>

<div id="topbar">
  <h1>&#11035; CV GENERATOR</h1>
  <div class="topbar-right">
    <!-- Color palette swatches -->
    <div class="palette-bar">
      <span class="palette-label">Theme</span>
      <span class="pal active" data-hex="111111" data-light-accent="#111111" style="background:#111111" title="Midnight"></span>
      <span class="pal" data-hex="1a3a6e" data-light-accent="#1a3a6e" style="background:#1a3a6e" title="Navy"></span>
      <span class="pal" data-hex="1e5e3a" data-light-accent="#1e5e3a" style="background:#1e5e3a" title="Forest"></span>
      <span class="pal" data-hex="8b1a1a" data-light-accent="#8b1a1a" style="background:#8b1a1a" title="Crimson"></span>
      <span class="pal" data-hex="5b3a8e" data-light-accent="#5b3a8e" style="background:#5b3a8e" title="Plum"></span>
    </div>
    <button class="btn sm" id="btn-load-demo">Load example</button>
    <button class="btn sm" id="btn-bug">&#128030; Report / Request</button>
    <button id="theme-toggle" title="Toggle theme">&#9728;</button>
  </div>
</div>

<div id="app">
  <div class="personal-block">
    <h2>Personal Info</h2>
    <div class="field-grid">
      <div class="field-group"><label>Full name</label><input type="text" id="pi-name" placeholder="Jean Dupont"/></div>
      <div class="field-group"><label>Title / tagline</label><input type="text" id="pi-title" placeholder="Master's student in AI"/></div>
      <div class="field-group"><label>Email</label><input type="text" id="pi-email" placeholder="you@example.com"/></div>
      <div class="field-group"><label>Website</label><input type="text" id="pi-website" placeholder="yoursite.com"/></div>
      <div class="field-group"><label>GitHub URL</label><input type="text" id="pi-github" placeholder="https://github.com/you"/></div>
      <div class="field-group"><label>LinkedIn URL</label><input type="text" id="pi-linkedin" placeholder="https://linkedin.com/in/you"/></div>
    </div>
  </div>
  <div id="sections-list"></div>
  <div id="add-section-bar">
    <button class="btn" onclick="addSection('education')">+ Education</button>
    <button class="btn" onclick="addSection('experience')">+ Experience</button>
    <button class="btn" onclick="addSection('publication')">+ Publications</button>
    <button class="btn" onclick="addSection('project')">+ Projects</button>
    <button class="btn" onclick="addSection('skills')">+ Skills</button>
    <button class="btn" onclick="addSection('achievements')">+ Achievements</button>
    <button class="btn" onclick="addSection('languages')">+ Languages</button>
    <button class="btn" onclick="addSection('generic')">+ Generic text</button>
    <button class="btn" onclick="addSection('pagebreak')">&#8629; Page break</button>
  </div>
  <div id="credits">
    &copy; 2025 <a href="https://baptistepras.fr/" target="_blank">Baptiste PRAS</a> &mdash;
    LaTeX CV Generator &mdash; Free to use
  </div>
</div>

<div id="action-bar">
  <button class="btn" onclick="openLatexModal()">&#128196; View LaTeX</button>
  <button class="btn primary" onclick="openPdfModal()">&#128424; Compile &amp; Preview</button>
</div>

<!-- LaTeX modal -->
<div class="modal-backdrop" id="latex-modal">
  <div class="modal">
    <div class="modal-header"><h3>LATEX SOURCE</h3><button class="btn sm" onclick="closeModal('latex-modal')">&#10005; Close</button></div>
    <div class="modal-body"><pre id="latex-code"></pre></div>
    <div class="modal-footer">
      <button class="btn" onclick="copyLatex()">&#128203; Copy</button>
      <button class="btn" onclick="downloadLatex()">&#8595; Download .tex</button>
    </div>
  </div>
</div>

<!-- PDF modal -->
<div class="modal-backdrop" id="pdf-modal">
  <div class="modal">
    <div class="modal-header"><h3>PDF PREVIEW</h3><button class="btn sm" onclick="closeModal('pdf-modal')">&#10005; Close</button></div>
    <div class="modal-body">
      <div id="pdf-status"></div>
      <iframe id="pdf-frame" style="display:none"></iframe>
      <button id="debug-toggle" onclick="toggleDebug()">&#9658; Debug log</button>
      <pre id="debug-log"></pre>
    </div>
    <div class="modal-footer">
      <button class="btn" id="btn-overleaf" onclick="openOverleaf()">&#127807; Open in Overleaf</button>
      <button class="btn primary" id="btn-dl-pdf" style="display:none" onclick="downloadPdf()">&#8595; Download PDF</button>
    </div>
  </div>
</div>

<!-- Bug / Feature report modal -->
<div class="modal-backdrop" id="bug-modal">
  <div class="modal" style="max-width:520px">
    <div class="modal-header"><h3>REPORT A BUG / REQUEST A FEATURE</h3><button class="btn sm" onclick="closeModal('bug-modal')">&#10005; Close</button></div>
    <div class="modal-body">
      <div class="form-field">
        <label>Your name</label>
        <input type="text" id="bug-name" placeholder="Optional"/>
      </div>
      <div class="form-field">
        <label>Your email</label>
        <input type="email" id="bug-email" placeholder="Optional — for a reply"/>
      </div>
      <div class="form-field">
        <label>Type</label>
        <select id="bug-type">
          <option value="Bug">&#128030; Bug report</option>
          <option value="Feature">&#9889; Feature request</option>
          <option value="Other">&#128172; Other</option>
        </select>
      </div>
      <div class="form-field">
        <label>Description</label>
        <textarea id="bug-desc" placeholder="Describe the bug or feature in detail&#10;For bugs: steps to reproduce, what you expected, what happened."></textarea>
      </div>
      <div id="bug-status"></div>
    </div>
    <div class="modal-footer">
      <button class="btn primary" onclick="submitBugReport()">&#128228; Send</button>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════
   PALETTES
   Each palette: { hex (LaTeX/light-mode color), display (CSS swatch) }
   themeHex is used in buildLatex() to colorize section titles and name.
   ═══════════════════════════════════════════════════════ */
let themeHex = '111111';

document.querySelectorAll('.pal').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.pal').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    themeHex = el.dataset.hex;
    // Update UI accent color
    const hex = '#' + themeHex;
    document.documentElement.style.setProperty('--accent', hex);
    document.documentElement.style.setProperty('--accent-fg', '#ffffff');
  });
});

/* ═══════════════════════════════════════════════════════
   TEXT COLORS FOR TOOLBAR
   5 swatches matching the palettes + black, always in the toolbar.
   ═══════════════════════════════════════════════════════ */
const SWATCH_COLORS = [
  { hex: '#111111', label: 'Black'   },
  { hex: '#1a3a6e', label: 'Navy'    },
  { hex: '#1e5e3a', label: 'Forest'  },
  { hex: '#8b1a1a', label: 'Crimson' },
  { hex: '#5b3a8e', label: 'Plum'    },
];

/* ═══════════════════════════════════════════════════════
   THEME TOGGLE
   ═══════════════════════════════════════════════════════ */
document.getElementById('theme-toggle').addEventListener('click', () => {
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', dark ? 'light' : 'dark');
  document.getElementById('theme-toggle').innerHTML = dark ? '&#127769;' : '&#9728;';
});

/* ═══════════════════════════════════════════════════════
   STATE + SCHEMAS
   ═══════════════════════════════════════════════════════ */
const state   = { sections: [] };
let   pdfBlob = null;

const SCHEMAS = {
  education: [
    { key: 'degree',      label: 'Degree / Program',          type: 'richtext'       },
    { key: 'institution', label: 'Institution',               type: 'richtext'       },
    { key: 'note',        label: 'Note (e.g. Honors)',        type: 'richtext'       },
    { key: 'dateRange',   label: 'Date range',                type: 'input'          },
    { key: 'location',    label: 'Location',                  type: 'input'          },
  ],
  experience: [
    { key: 'role',        label: 'Role / Title',              type: 'richtext'       },
    { key: 'org',         label: 'Organization',              type: 'richtext'       },
    { key: 'dateRange',   label: 'Date range',                type: 'input'          },
    { key: 'location',    label: 'Location',                  type: 'input'          },
    { key: 'description', label: 'Description',               type: 'richtext-long'  },
    { key: 'contact',     label: 'Contact (optional)',        type: 'input'          },
  ],
  publication: [
    { key: 'title',       label: 'Title',                     type: 'richtext'       },
    { key: 'venue',       label: 'Venue',                     type: 'richtext'       },
  ],
  project: [
    { key: 'title',       label: 'Title',                     type: 'richtext'       },
    { key: 'url',         label: 'URL',                       type: 'input'          },
    { key: 'description', label: 'Description',               type: 'richtext-long'  },
  ],
  skills: [
    { key: 'category',    label: 'Category',                  type: 'richtext'       },

/* ═══════════════════════════════════════════════════════
   HTML ESCAPE
   ═══════════════════════════════════════════════════════ */
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ═══════════════════════════════════════════════════════
   LATEX ESCAPE (plain text segments only)
   ═══════════════════════════════════════════════════════ */
function le(s) {
  if (!s) return '';
  return String(s)
    .replace(/\\/g,  '\\textbackslash{}')
    .replace(/&/g,   '\\&')
    .replace(/%/g,   '\\%')
    .replace(/\$/g,  '\\$')
    .replace(/#/g,   '\\#')
    .replace(/_/g,   '\\_')
    .replace(/\{/g,  '\\{')
    .replace(/\}/g,  '\\}')
    .replace(/~/g,   '\\textasciitilde{}')
    .replace(/\^/g,  '\\textasciicircum{}');
}

/* ═══════════════════════════════════════════════════════
   COLOR HELPER: rgb(r,g,b) → RRGGBB
   ═══════════════════════════════════════════════════════ */
function rgbToHex(rgb) {
  const m = rgb.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);
  if (!m) return null;
  return [m[1], m[2], m[3]].map(n => (+n).toString(16).padStart(2,'0')).join('').toUpperCase();
}

/* ═══════════════════════════════════════════════════════
   HTML → LATEX CONVERTER
   Walks contenteditable DOM, converts to LaTeX.
   ═══════════════════════════════════════════════════════ */
function walkNode(n) {
  if (n.nodeType === 3) return le(n.textContent);
  if (n.nodeType !== 1) return '';
  const tag  = n.tagName;
  const kids = () => Array.from(n.childNodes).map(walkNode).join('');

  switch (tag) {
    case 'B': case 'STRONG': return '\\textbf{' + kids() + '}';
    case 'I': case 'EM':     return '\\textit{' + kids() + '}';
    case 'U':                return '\\underline{' + kids() + '}';
    case 'FONT': {
      // execCommand('foreColor') uses <font color="#rrggbb"> in some browsers
      const col = n.getAttribute('color');
      if (col) {
        const hex = col.replace('#', '').toUpperCase();
        return '\\textcolor[HTML]{' + hex + '}{' + kids() + '}';
      }
      return kids();
    }
    case 'SPAN': {
      // execCommand('foreColor') uses <span style="color: rgb(...)"> in others
      const c = n.style && n.style.color;
      if (c) {
        // could be #rrggbb or rgb(...)
        let hex = null;
        if (c.startsWith('#'))   hex = c.slice(1).toUpperCase();
        else if (c.startsWith('rgb')) hex = rgbToHex(c);
        if (hex) return '\\textcolor[HTML]{' + hex + '}{' + kids() + '}';
      }
      return kids();
    }
    case 'UL':
      return '\n\\begin{itemize}[leftmargin=1.1em,topsep=2pt,itemsep=0pt,parsep=0pt,partopsep=0pt]\n'
           + kids() + '\\end{itemize}\n';
    case 'OL':
      return '\n\\begin{enumerate}[leftmargin=1.1em,topsep=2pt,itemsep=0pt,parsep=0pt,partopsep=0pt]\n'
           + kids() + '\\end{enumerate}\n';
    case 'LI':  return '    \\item ' + kids().trim() + '\n';
    case 'BR':  return n.nextSibling ? ' ' : '';
    case 'DIV': case 'P': { const c = kids(); return c.trim() ? c + ' ' : ''; }
    default:    return kids();
  }
}

function htmlToLatex(html) {
  if (!html) return '';
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  return walkNode(tmp).replace(/[ \t]{2,}/g, ' ').trim();
}

/* ═══════════════════════════════════════════════════════
   RICH TEXT FIELD HTML BUILDER
   ═══════════════════════════════════════════════════════ */
function fieldHtml(secId, entryId, f) {
  if (f.type === 'input') {
    return '<div class="entry-field"><label>' + esc(f.label) + '</label>'
         + '<input type="text" id="fi-' + entryId + '-' + f.key + '"'
         + ' onchange="updateInputField(\'' + secId + '\',\'' + entryId + '\',\'' + f.key + '\',this.value)"/>'
         + '</div>';
  }
  const isLong = f.type === 'richtext-long';
  const rid    = 'ri-' + entryId + '-' + f.key;

  // B / I / U buttons
  const listBtn = isLong
    ? '<button type="button" class="rtb" onmousedown="event.preventDefault()" onclick="document.execCommand(\'insertUnorderedList\')" title="Bullet list">&#8226;</button>'
    : '';

  // Color swatches
  const swatches = SWATCH_COLORS.map(c =>
    '<span class="color-swatch" style="background:' + c.hex + '"'
    + ' title="' + c.label + '"'
    + ' onmousedown="event.preventDefault()"'
    + ' onclick="applyColor(\'' + c.hex + '\')" ></span>'
  ).join('');

  const toolbar =
    '<div class="rich-toolbar">'
    + '<button type="button" class="rtb" onmousedown="event.preventDefault()" onclick="document.execCommand(\'bold\')" title="Bold"><b>B</b></button>'
    + '<button type="button" class="rtb" onmousedown="event.preventDefault()" onclick="document.execCommand(\'italic\')" title="Italic"><i>I</i></button>'
    + '<button type="button" class="rtb" onmousedown="event.preventDefault()" onclick="document.execCommand(\'underline\')" title="Underline"><u>U</u></button>'
    + listBtn
    + '<span class="toolbar-sep"></span>'
    + swatches
    + '</div>';

  const cls = 'rich-editor ' + (isLong ? 'long' : 'short');
  const noEnter = isLong ? '' : ' onkeydown="if(event.key===\'Enter\')event.preventDefault()"';

  const editor =
    '<div class="' + cls + '" id="' + rid + '" contenteditable="true"' + noEnter
    + ' oninput="updateRichField(\'' + secId + '\',\'' + entryId + '\',\'' + f.key + '\')"></div>';

  return '<div class="entry-field"><label>' + esc(f.label) + '</label>' + toolbar + editor + '</div>';
}

/** Apply foreground color to current selection. */
function applyColor(hex) {
  document.execCommand('foreColor', false, hex);
}

/* ═══════════════════════════════════════════════════════
   FIELD UPDATE HELPERS
   ═══════════════════════════════════════════════════════ */
function updateInputField(secId, entryId, key, value) {
  const sec   = state.sections.find(s => s.id === secId);
  const entry = sec?.entries.find(e => e.id === entryId);
  if (entry) entry.fields[key] = value;
}

function updateRichField(secId, entryId, key) {
  const el    = document.getElementById('ri-' + entryId + '-' + key);
  if (!el) return;
  const sec   = state.sections.find(s => s.id === secId);
  const entry = sec?.entries.find(e => e.id === entryId);
  if (!entry) return;
  entry.fields[key] = el.innerHTML;
  const schema = SCHEMAS[sec.type] || [];
  if (schema[0]?.key === key) {
    const prev = document.getElementById('epreview-' + entryId);
    if (prev) prev.textContent = el.innerText.trim() || '(empty)';
  }
}

function setEntryValues(entry, sec) {
  const schema = SCHEMAS[sec.type] || [];
  schema.forEach(f => {
    const val = entry.fields[f.key];
    if (val === undefined || val === null) return;
    if (f.type === 'input') {
      const el = document.getElementById('fi-' + entry.id + '-' + f.key);
      if (el) el.value = val;
    } else {
      const el = document.getElementById('ri-' + entry.id + '-' + f.key);
      if (el) el.innerHTML = val;
    }
  });
  const firstF = schema[0];
  if (firstF) {
    const prev = document.getElementById('epreview-' + entry.id);
    if (prev) {
      if (firstF.type === 'input') {
        prev.textContent = entry.fields[firstF.key] || '(empty)';
      } else {
        const el = document.getElementById('ri-' + entry.id + '-' + firstF.key);
        prev.textContent = el ? (el.innerText.trim() || '(empty)') : '(empty)';
      }
    }
  }
}

/* ═══════════════════════════════════════════════════════
   SECTION / ENTRY MANAGEMENT
   ═══════════════════════════════════════════════════════ */
function addSection(type) {
  const sec = { id: uid(), type, name: TYPE_LABELS[type] || 'Section', entries: [] };
  state.sections.push(sec);
  if (type === 'pagebreak') { renderPagebreak(sec); return; }
  renderSection(sec);
  if (SCHEMAS[type]?.length) addEntry(sec.id);
}

function removeSection(secId) {
  state.sections = state.sections.filter(s => s.id !== secId);
  document.getElementById('sec-' + secId)?.remove();
}

function updateSectionName(secId, val) {
  const sec = state.sections.find(s => s.id === secId);
  if (sec) sec.name = val;
}

function addEntry(secId) {
  const sec = state.sections.find(s => s.id === secId);
  if (!sec) return;
  const schema = SCHEMAS[sec.type] || [];
  const entry  = { id: uid(), fields: Object.fromEntries(schema.map(f => [f.key, ''])) };
  sec.entries.push(entry);
  renderEntry(secId, entry);
}

function removeEntry(secId, entryId) {
  const sec = state.sections.find(s => s.id === secId);
  if (sec) sec.entries = sec.entries.filter(e => e.id !== entryId);
  document.getElementById('entry-' + entryId)?.remove();
}

function toggleEntry(entryId) {
  document.getElementById('ebody-' + entryId)?.classList.toggle('open');
  document.getElementById('etog-'  + entryId)?.classList.toggle('open');
}

/* ═══════════════════════════════════════════════════════
   RENDER
   ═══════════════════════════════════════════════════════ */
function renderPagebreak(sec) {
  const list = document.getElementById('sections-list');
  const card = document.createElement('div');
  card.className = 'pagebreak-card'; card.id = 'sec-' + sec.id;
  card.draggable = true; card.dataset.secId = sec.id;
  card.innerHTML =
    '<div class="pagebreak-header">'
    + '<span class="section-drag-handle">&#10783;</span>'
    + '<span class="pagebreak-label">&#8629; PAGE BREAK</span>'
    + '<div class="section-actions"><button class="btn sm danger" onclick="removeSection(\'' + sec.id + '\')">&#10005;</button></div>'
    + '</div>';
  list.appendChild(card); setupSectionDrag(card);
}

function renderSection(sec) {
  const list = document.getElementById('sections-list');
  const card = document.createElement('div');
  card.className = 'section-card'; card.id = 'sec-' + sec.id;
  card.draggable = true; card.dataset.secId = sec.id;
  card.innerHTML =
    '<div class="section-header">'
    + '<span class="section-drag-handle">&#10783;</span>'
    + '<input class="section-name" type="text" value="' + esc(sec.name) + '"'
    +   ' onchange="updateSectionName(\'' + sec.id + '\',this.value)" title="Click to rename"/>'
    + '<span class="section-type-label">[' + sec.type + ']</span>'
    + '<div class="section-actions">'
    +   '<button class="btn sm" onclick="addEntry(\'' + sec.id + '\')">+ Entry</button>'
    +   '<button class="btn sm danger" onclick="removeSection(\'' + sec.id + '\')">&#10005;</button>'
    + '</div></div>'
    + '<div class="section-body">'
    +   '<div class="entries-list" id="entries-' + sec.id + '"></div>'
    +   '<div class="add-entry-row"><button class="btn sm" onclick="addEntry(\'' + sec.id + '\')">+ Add entry</button></div>'
    + '</div>';
  list.appendChild(card); setupSectionDrag(card);
}

function renderEntry(secId, entry) {
  const sec    = state.sections.find(s => s.id === secId);
  const schema = SCHEMAS[sec.type] || [];
  const list   = document.getElementById('entries-' + secId);
  const card   = document.createElement('div');
  card.className = 'entry-card'; card.id = 'entry-' + entry.id;
  card.draggable = true; card.dataset.entryId = entry.id; card.dataset.secId = secId;
  const fieldsHtml = schema.map(f => fieldHtml(secId, entry.id, f)).join('');
  const preview    = (schema[0]?.key && entry.fields[schema[0].key]) || '(empty)';
  card.innerHTML =
    '<div class="entry-header" onclick="toggleEntry(\'' + entry.id + '\')">'
    + '<span class="entry-drag-handle" onclick="event.stopPropagation()">&#10783;</span>'
    + '<span class="entry-title-preview" id="epreview-' + entry.id + '">' + esc(preview) + '</span>'
    + '<span class="entry-toggle open" id="etog-' + entry.id + '">&#9662;</span>'
    + '</div>'
    + '<div class="entry-body open" id="ebody-' + entry.id + '"><div class="entry-fields">' + fieldsHtml + '</div></div>'
    + '<div class="entry-footer"><button class="btn sm danger" onclick="removeEntry(\'' + secId + '\',\'' + entry.id + '\')">&#10005; Remove</button></div>';
  list.appendChild(card); setupEntryDrag(card);
}

/* ═══════════════════════════════════════════════════════
   DRAG & DROP
   ═══════════════════════════════════════════════════════ */
let dragSec = null, dragEntry = null;

function setupSectionDrag(card) {
  card.addEventListener('dragstart', e => { dragSec = card; e.dataTransfer.effectAllowed = 'move'; e.stopPropagation(); setTimeout(() => card.classList.add('dragging'), 0); });
  card.addEventListener('dragend',   () => { card.classList.remove('dragging'); document.querySelectorAll('.section-card,.pagebreak-card').forEach(c => c.classList.remove('drag-over')); dragSec = null; syncSectionOrder(); });
  card.addEventListener('dragover',  e => { if (!dragSec || dragSec === card) return; e.preventDefault(); card.classList.add('drag-over'); });
  card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
  card.addEventListener('drop', e => {
    e.preventDefault(); card.classList.remove('drag-over');
    if (!dragSec || dragSec === card) return;
    const list  = document.getElementById('sections-list');
    const cards = [...list.children];
    if (cards.indexOf(dragSec) < cards.indexOf(card)) list.insertBefore(dragSec, card.nextSibling);
    else list.insertBefore(dragSec, card);
  });
}

function syncSectionOrder() {
  const cards = [...document.getElementById('sections-list').children];
  const byId  = Object.fromEntries(state.sections.map(s => [s.id, s]));
  state.sections = cards.map(c => byId[c.dataset.secId]).filter(Boolean);
}

function setupEntryDrag(card) {
  card.addEventListener('dragstart', e => { dragEntry = card; e.dataTransfer.effectAllowed = 'move'; e.stopPropagation(); setTimeout(() => card.classList.add('dragging'), 0); });
  card.addEventListener('dragend',   () => { card.classList.remove('dragging'); document.querySelectorAll('.entry-card').forEach(c => c.classList.remove('drag-over')); dragEntry = null; syncEntryOrders(); });
  card.addEventListener('dragover',  e => { if (!dragEntry || dragEntry === card || dragEntry.dataset.secId !== card.dataset.secId) return; e.preventDefault(); e.stopPropagation(); card.classList.add('drag-over'); });
  card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
  card.addEventListener('drop', e => {
    e.preventDefault(); e.stopPropagation(); card.classList.remove('drag-over');
    if (!dragEntry || dragEntry === card || dragEntry.dataset.secId !== card.dataset.secId) return;
    const list  = document.getElementById('entries-' + card.dataset.secId);
    const cards = [...list.querySelectorAll('.entry-card')];
    if (cards.indexOf(dragEntry) < cards.indexOf(card)) list.insertBefore(dragEntry, card.nextSibling);
    else list.insertBefore(dragEntry, card);
  });
}

function syncEntryOrders() {
  state.sections.forEach(sec => {
    const list = document.getElementById('entries-' + sec.id);
    if (!list) return;
    const byId = Object.fromEntries(sec.entries.map(e => [e.id, e]));
    sec.entries = [...list.querySelectorAll('.entry-card')].map(c => byId[c.dataset.entryId]).filter(Boolean);
  });
}

function syncAll() { syncEntryOrders(); syncSectionOrder(); }

/* ═══════════════════════════════════════════════════════
   LATEX GENERATION
   ═══════════════════════════════════════════════════════ */
function getPI() {
  return {
    name:     document.getElementById('pi-name').value.trim(),
    title:    document.getElementById('pi-title').value.trim(),
    email:    document.getElementById('pi-email').value.trim(),

  };
}

function buildLatex() {
  const pi = getPI();
  const hex = themeHex;               // RRGGBB, no #
  const colored = hex !== '111111';   // only inject color commands if non-black

  // Column spec — must be plain string concatenation to avoid JS eating backslashes
  const RL      = '\\RaggedLeft\\arraybackslash';
  const colSpec  = '>{' + RL + '}';
  const tabCols  = '@{}p{0.70\\textwidth}@{\\extracolsep{\\fill}}' + colSpec + 'p{0.28\\textwidth}@{}';

  let tex = '';
  tex += '\\documentclass[10.4pt,a4paper]{article}\n';
  tex += '\\usepackage[a4paper,margin=1.4cm]{geometry}\n';
  tex += '\\usepackage[T1]{fontenc}\n';
  tex += '\\usepackage[utf8]{inputenc}\n';
  tex += '\\usepackage{newtxtext,newtxmath}\n';
  tex += '\\usepackage{fontawesome5}\n';
  tex += '\\usepackage[hidelinks]{hyperref}\n';
  tex += '\\usepackage{xcolor}\n';
  tex += '\\usepackage{enumitem}\n';
  tex += '\\usepackage{tabularx}\n';
  tex += '\\usepackage{array}\n';
  tex += '\\usepackage{ragged2e}\n';
  tex += '\\usepackage{titlesec}\n';
  tex += '\\usepackage{setspace}\n';
  tex += '\\usepackage{parskip}\n';
  tex += '\\usepackage{multicol}\n';
  tex += '\\usepackage{needspace}\n';

  if (colored) {
    tex += '\\definecolor{themecolor}{HTML}{' + hex.toUpperCase() + '}\n';
  }

  tex += '\\setlength{\\parindent}{0pt}\n';
  tex += '\\setlength{\\parskip}{0pt}\n';
  tex += '\\setlength{\\tabcolsep}{0pt}\n';
  tex += '\\linespread{1.02}\n';
  tex += '\\pagestyle{empty}\n';
  tex += '\\urlstyle{same}\n';
  tex += '\\setlist[itemize]{\n';
  tex += '    leftmargin=1.1em,\n';
  tex += '    itemsep=0.05em,\n';
  tex += '    topsep=0.05em,\n';
  tex += '    parsep=0em,\n';
  tex += '    partopsep=0em\n';
  tex += '}\n';

  // Section style — colored if a theme is active
  const sectionColor = colored ? '\\color{themecolor}' : '';
  tex += '\\titleformat{\\section}\n';
  tex += '  {\\Large\\bfseries' + sectionColor + '}\n';
  tex += '  {}\n';
  tex += '  {0pt}\n';
  tex += '  {\\MakeUppercase}\n';
  tex += '  [\\vspace{0.15em}\\titlerule]\n';
  tex += '\\titlespacing*{\\section}{0pt}{0.6em}{0.25em}\n';

  // Name color in header
  const nameColor = colored ? '\\color{themecolor}' : '';
  tex += '\\newcommand{\\cvheadername}[1]{%\n';
  tex += '    {\\fontsize{25}{28}\\selectfont\\bfseries' + (colored ? '\\color{themecolor}' : '') + ' #1\\par}\n';
  tex += '}\n';
  tex += '\\newcommand{\\cvheadersubtitle}[1]{%\n';
  tex += '    \\vspace{0.35em}\n';
  tex += '    {\\fontsize{15}{18}\\selectfont\\itshape #1\\par}\n';
  tex += '}\n';
  tex += '\\newcommand{\\contactline}[1]{%\n';
  tex += '    \\vspace{0.8em}\n';
  tex += '    {\\normalsize #1\\par}\n';
  tex += '}\n';

  tex += '\\newcommand{\\eduentry}[5]{%\n';
  tex += '    \\begin{tabular*}{\\textwidth}{' + tabCols + '}\n';
  tex += '        {\\large\\bfseries #1} & {\\large #4} \\\\\n';
  tex += '        {\\large\\itshape #2} & {\\large #5} \\\\\n';
  tex += '        \\if\\relax\\detokenize{#3}\\relax\n';
  tex += '        \\else\n';
  tex += '        {\\large #3} & \\\\\n';
  tex += '        \\fi\n';
  tex += '    \\end{tabular*}\n';
  tex += '    \\vspace{0.15em}\n';
  tex += '}\n';

  tex += '\\newcommand{\\pubentry}[2]{%\n';
  tex += '    {\\large\\bfseries #1\\par}\n';
  tex += '    {\\large\\itshape #2\\par}\n';
  tex += '    \\vspace{0.45em}\n';
  tex += '}\n';

  tex += '\\newcommand{\\experienceentry}[6]{%\n';
  tex += '    \\Needspace{10\\baselineskip}\n';
  tex += '    \\begin{tabular*}{\\textwidth}{' + tabCols + '}\n';
  tex += '        {\\large\\bfseries #1} & {\\large #3} \\\\\n';
  tex += '        {\\large\\itshape #2} & {\\large #4} \\\\\n';
  tex += '    \\end{tabular*}\n';
  tex += '    \\begin{itemize}[leftmargin=1.1em,topsep=0pt,itemsep=0pt,parsep=0pt,partopsep=0pt]\n';
  tex += '        \\item {\\large #5}\n';

  tex += '    \\contactline{\n';
  tex += '        \\faEnvelope\\ \\href{mailto:' + pi.email + '}{' + le(pi.email) + '}';
  if (pi.website) tex += '\n        \\hspace{1.2em}\n        \\faLink\\ \\href{https://' + pi.website + '}{' + le(pi.website) + '}';
  if (pi.github)  tex += '\n        \\hspace{1.2em}\n        \\faGithub\\ \\href{' + pi.github + '}{' + le(pi.github) + '}';
  tex += '\n    }\n\n';
  if (pi.linkedin) tex += '    \\contactline{\n        \\faLinkedin\\ \\href{' + pi.linkedin + '}{' + le(pi.linkedin) + '}\n    }\n';
  tex += '\\end{center}\n';

  // Sections
  state.sections.forEach(sec => {
    if (sec.type === 'pagebreak') { tex += '\n\\newpage\n'; return; }

    tex += '\n';
    if (sec.name.trim()) tex += '\\section{' + le(sec.name) + '}\n\n';

    const rt = v => htmlToLatex(v || '');
    const lp = v => le(v || '');

    // Languages uses the full tabular* layout from the template
    if (sec.type === 'languages' && sec.entries.length) {
      tex += '\\begin{tabular*}{\\textwidth}{@{}p{0.48\\textwidth}@{\\extracolsep{\\fill}}p{0.48\\textwidth}@{}}\n';
      for (let i = 0; i < sec.entries.length; i += 2) {
        const L = sec.entries[i];
        const R = sec.entries[i + 1];

        const getCerts = e => {
          if (!e?.fields.certs) return [];
          const el  = document.getElementById('ri-' + e.id + '-certs');
          const raw = el ? el.innerText.trim() : '';
          return raw.split(/\s*[—–\-]\s*|\n/).map(s => le(s.trim())).filter(Boolean);
        };

        const Ln = rt(L.fields.language), Ll = rt(L.fields.level), Lc = getCerts(L);
        const Rn = R ? rt(R.fields.language) : '';
        const Rl = R ? rt(R.fields.level)    : '';
        const Rc = R ? getCerts(R)           : [];

        tex += '    {\\large\\bfseries ' + Ln + '} & ' + (Rn ? '{\\large\\bfseries ' + Rn + '}' : '') + ' \\\\\n';
        tex += '    {\\large ' + Ll + '} & ' + (Rl ? '{\\large ' + Rl + '}' : '') + ' \\\\\n';
        const maxC = Math.max(Lc.length, Rc.length);
        for (let j = 0; j < maxC; j++) {
          const lc = Lc[j] ? '{\\large ' + Lc[j] + '}' : '';
          const rc = Rc[j] ? '{\\large ' + Rc[j] + '}' : '';
          tex += '    ' + lc + ' & ' + rc + ' \\\\\n';
        }
        if (i + 2 < sec.entries.length) tex += '    [0.9em]\n';
      }
      tex += '\\end{tabular*}\n\n';
      return;
    }

    sec.entries.forEach(entry => {
      const f = entry.fields;
      switch (sec.type) {
        case 'education':
          tex += '\\eduentry\n';
          tex += '{' + rt(f.degree) + '}\n{' + rt(f.institution) + '}\n{' + rt(f.note) + '}\n';
          tex += '{' + lp(f.dateRange) + '}\n{' + lp(f.location) + '}\n\n';
          break;
        case 'publication':
          tex += '\\pubentry\n{' + rt(f.title) + '}\n{' + rt(f.venue) + '}\n\n';
          break;
        case 'experience':
          if (f.contact && f.contact.trim()) {
            tex += '\\experienceentry\n{' + rt(f.role) + '}\n{' + rt(f.org) + '}\n';
            tex += '{' + lp(f.dateRange) + '}\n{' + lp(f.location) + '}\n';
            tex += '{' + rt(f.description) + '}\n{Contact: ' + lp(f.contact) + '}\n\n';
          } else {
            tex += '\\experienceentrynocon\n{' + rt(f.role) + '}\n{' + rt(f.org) + '}\n';
            tex += '{' + lp(f.dateRange) + '}\n{' + lp(f.location) + '}\n';
            tex += '{' + rt(f.description) + '}\n\n';
          }
          break;
        case 'project':
          tex += '\\projectentry\n{' + rt(f.title) + '}\n{' + rt(f.description) + '}\n{' + lp(f.url) + '}\n\n';
          break;
        case 'skills':
          tex += '\\skillblock\n{' + rt(f.category) + '}\n{' + rt(f.items) + '}\n\n';
          break;
        case 'achievements':
          tex += '{\\large\\bfseries ' + rt(f.text) + '\\par}\n\\vspace{0.5em}\n\n';
          break;
        case 'generic':
        default: {
          const content = rt(f.content);
          if (content.trim()) tex += '{\\large ' + content + '\\par}\n\n';
          break;
        }
      }
    });
  });

  tex += '\n\\end{document}\n';
  return tex;
}

/* ═══════════════════════════════════════════════════════
   PDF COMPILATION
   ═══════════════════════════════════════════════════════ */
let debugLines = [];
const dbg = msg => {
  debugLines.push(msg);
  document.getElementById('debug-log').textContent = debugLines.join('\n');
};

async function compilePdf() {
  const tex    = buildLatex();
  const status = document.getElementById('pdf-status');
  debugLines = [];
  dbg('[1] Trying latex.ytotech.com (CORS-enabled)...');

  const showSuccess = async blob => {
    pdfBlob = blob;
    const url   = URL.createObjectURL(pdfBlob);
    const frame = document.getElementById('pdf-frame');
    frame.src = url; frame.style.display = 'block';
    document.getElementById('btn-dl-pdf').style.display   = 'inline-flex';
    document.getElementById('debug-toggle').style.display = 'inline';
    status.textContent = '';
    dbg('OK — ' + (pdfBlob.size / 1024).toFixed(1) + ' KB');
  };

  try {
    const res = await fetch('https://latex.ytotech.com/builds/sync', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ compiler: 'pdflatex', resources: [{ main: true, content: tex }] }),
    });
    dbg('[2] ytotech HTTP ' + res.status + ' ' + res.statusText);
    const ct = res.headers.get('content-type') || '';
    dbg('[3] Content-Type: ' + ct);

    if (res.ok && ct.includes('pdf')) { await showSuccess(await res.blob()); return; }

    const body = await res.text();
    dbg('[4] Error:\n' + body.slice(0, 600));
    throw new Error(body.split('\n').find(l => l.startsWith('!')) || 'Compilation failed.');
  } catch (err) {
    dbg('[ERR ytotech] ' + err.name + ': ' + err.message);
    if (err.name !== 'TypeError') {
      document.getElementById('debug-toggle').style.display = 'inline';
      status.innerHTML = '<span style="color:var(--danger)">&#9888; ' + esc(err.message) + '</span>';
      return;
    }

    dbg('[5] Falling back to texlive.net...');
    const fd = new FormData();
    fd.append('filecontents[]', new Blob([tex], { type: 'text/plain' }), 'cv.tex');
    fd.append('filename[]', 'cv.tex'); fd.append('engine', 'pdflatex'); fd.append('return', 'pdf');
    try {
      const res2 = await fetch('https://texlive.net/cgi-bin/latexcgi', { method: 'POST', body: fd });
      dbg('[6] texlive.net HTTP ' + res2.status);
      const ct2 = res2.headers.get('content-type') || '';
      if (ct2.includes('pdf')) { await showSuccess(await res2.blob()); return; }
      const log2 = await res2.text();
      dbg('[7] texlive.net error:\n' + log2.slice(0, 600));
      throw new Error('texlive.net: ' + (log2.split('\n').find(l => l.startsWith('!')) || 'failed.'));
    } catch (err2) {
      dbg('[ERR texlive] ' + err2.name + ': ' + err2.message);
    }

    document.getElementById('debug-toggle').style.display = 'inline';
    status.innerHTML =
      '<span style="color:var(--danger)">&#9888; Both APIs unreachable from this browser. '
      + 'Use <b>Open in Overleaf</b> below.</span>';
  }
}

/**
 * Open the generated .tex directly in a new Overleaf project.
 * Uses enctype="multipart/form-data" with a <textarea> to preserve
 * all newlines — an <input> with url-encoded body would collapse \n
 * making % comments swallow the rest of the document.
 */
function openOverleaf() {
  const tex  = buildLatex();
  const form = document.createElement('form');
  form.method  = 'POST';
  form.action  = 'https://www.overleaf.com/docs';
  form.target  = '_blank';
  form.enctype = 'multipart/form-data';
  const ta     = document.createElement('textarea');
  ta.name      = 'snip';
  ta.value     = tex;
  form.appendChild(ta);
  document.body.appendChild(form);
  form.submit();
  document.body.removeChild(form);
}

function downloadPdf()    { if (pdfBlob) triggerDownload(URL.createObjectURL(pdfBlob), 'cv.pdf'); }

function copyLatex()      { navigator.clipboard.writeText(document.getElementById('latex-code').textContent).then(() => alert('Copied!')); }

function downloadLatex()  {
  const blob = new Blob([document.getElementById('latex-code').textContent], { type: 'text/plain' });
  triggerDownload(URL.createObjectURL(blob), 'cv.tex');
}

function triggerDownload(url, filename) {
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

async function submitBugReport() {
  const name  = document.getElementById('bug-name').value.trim();
  const email = document.getElementById('bug-email').value.trim();
  const type  = document.getElementById('bug-type').value;
  const desc  = document.getElementById('bug-desc').value.trim();
  const st    = document.getElementById('bug-status');

  if (!desc) { st.innerHTML = '<span style="color:var(--danger)">Please fill in the description.</span>'; return; }

  st.innerHTML = 'Sending\u2026 <span class="spinner"></span>';

  try {
    const res = await fetch('https://formspree.io/f/mrbarvev', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, type, description: desc, source: 'cv-generator' }),
    });
    if (res.ok) {
      st.innerHTML = '<span style="color:#1e5e3a">&#10003; Sent! Thank you.</span>';
      document.getElementById('bug-desc').value = '';
      setTimeout(() => closeModal('bug-modal'), 1800);
    } else if (res.status === 402) {
      st.innerHTML = '<span style="color:var(--danger)">Monthly limit reached. Try again later.</span>';
    } else {
      st.innerHTML = '<span style="color:var(--danger)">Failed to send. Try again.</span>';
    }
  } catch {
    st.innerHTML = '<span style="color:var(--danger)">Network error. Check your connection.</span>';
  }
}
